# =============================================================================
# AI Job Application Agent — Autonomous Scheduler
# Runs 3x/week: Mon/Wed/Fri at 09:00 IST (03:30 UTC)
# =============================================================================

name: Autonomous Pipeline Run

on:
  schedule:
    # 09:00 IST = 03:30 UTC on Mon, Wed, Fri
    - cron: '30 3 * * 1,3,5'
  
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - scrape-only
          - apply-only
          - dry-run
      dry_run:
        description: 'Dry run (skip actual applications)'
        required: false
        default: false
        type: boolean

env:
  # LLM APIs
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
  NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
  
  # Database
  LOCAL_POSTGRES_URL: ${{ secrets.LOCAL_POSTGRES_URL }}
  LOCAL_POSTGRES_USER: postgres
  LOCAL_POSTGRES_PASSWORD: ${{ secrets.LOCAL_POSTGRES_PASSWORD }}
  LOCAL_POSTGRES_DB: ai_job_db
  ACTIVE_DB: local
  
  # Redis & ChromaDB
  REDIS_URL: redis://redis:6379/0
  CHROMADB_HOST: chromadb
  CHROMADB_PORT: 8000
  
  # Services
  RAG_SERVER_URL: http://rag-server:8090
  SCRAPER_SERVICE_URL: http://playwright-scraper:8001
  SCRAPER_SERVICE_API_KEY: ${{ secrets.SCRAPER_SERVICE_API_KEY }}
  
  # SerpAPI keys (round-robin)
  SERPAPI_API_KEY_1: ${{ secrets.SERPAPI_API_KEY_1 }}
  SERPAPI_API_KEY_2: ${{ secrets.SERPAPI_API_KEY_2 }}
  SERPAPI_API_KEY_3: ${{ secrets.SERPAPI_API_KEY_3 }}
  SERPAPI_API_KEY_4: ${{ secrets.SERPAPI_API_KEY_4 }}
  
  # Proxies
  WEBSHARE_PROXY_LIST: ${{ secrets.WEBSHARE_PROXY_LIST }}
  WEBSHARE_USERNAME_1: ${{ secrets.WEBSHARE_USERNAME_1 }}
  WEBSHARE_PASSWORD_1: ${{ secrets.WEBSHARE_PASSWORD_1 }}
  WEBSHARE_USERNAME_2: ${{ secrets.WEBSHARE_USERNAME_2 }}
  WEBSHARE_PASSWORD_2: ${{ secrets.WEBSHARE_PASSWORD_2 }}
  
  # Notion
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_APPLICATIONS_DB_ID: ${{ secrets.NOTION_APPLICATIONS_DB_ID }}
  NOTION_JOB_TRACKER_DB_ID: ${{ secrets.NOTION_JOB_TRACKER_DB_ID }}
  NOTION_ALERTS_DB_ID: ${{ secrets.NOTION_ALERTS_DB_ID }}
  
  # System config
  XAI_COST_CAP_PER_RUN: "0.38"
  TOTAL_MONTHLY_BUDGET: "10.00"
  JOBS_PER_RUN_TARGET: "150"
  JOBS_PER_RUN_MINIMUM: "100"
  MAX_PLAYWRIGHT_SESSIONS: "5"
  AUTO_APPLY_ENABLED: ${{ secrets.AUTO_APPLY_ENABLED || 'true' }}
  DRY_RUN: "false"
  LOG_LEVEL: INFO
  RESUME_DIR: /app/resumes
  DEFAULT_RESUME: default_resume.pdf

jobs:
  run_pipeline:
    name: Run AI Job Agent Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ------------------------------------------------------------------
      # Step 1: Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Step 2: Setup Python 3.11
      # ------------------------------------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ------------------------------------------------------------------
      # Step 3: Install Docker Compose
      # ------------------------------------------------------------------
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      # ------------------------------------------------------------------
      # Step 4: Write java.env from secrets
      # ------------------------------------------------------------------
      - name: Create java.env configuration
        run: |
          cat > java.env << 'EOF'
          # LLM APIs
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY=${{ secrets.CEREBRAS_API_KEY }}
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          SAMBANOVA_API_KEY=${{ secrets.SAMBANOVA_API_KEY }}
          NVIDIA_NIM_API_KEY=${{ secrets.NVIDIA_NIM_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          AGENTOPS_API_KEY=${{ secrets.AGENTOPS_API_KEY }}
          
          # Database
          LOCAL_POSTGRES_URL=${{ secrets.LOCAL_POSTGRES_URL }}
          LOCAL_POSTGRES_USER=postgres
          LOCAL_POSTGRES_PASSWORD=${{ secrets.LOCAL_POSTGRES_PASSWORD }}
          LOCAL_POSTGRES_DB=ai_job_db
          ACTIVE_DB=local
          
          # Redis & ChromaDB
          REDIS_URL=redis://redis:6379/0
          CHROMADB_HOST=chromadb
          CHROMADB_PORT=8000
          
          # Services
          RAG_SERVER_URL=http://rag-server:8090
          SCRAPER_SERVICE_URL=http://playwright-scraper:8001
          SCRAPER_SERVICE_API_KEY=${{ secrets.SCRAPER_SERVICE_API_KEY }}
          
          # SerpAPI keys
          SERPAPI_API_KEY_1=${{ secrets.SERPAPI_API_KEY_1 }}
          SERPAPI_API_KEY_2=${{ secrets.SERPAPI_API_KEY_2 }}
          SERPAPI_API_KEY_3=${{ secrets.SERPAPI_API_KEY_3 }}
          SERPAPI_API_KEY_4=${{ secrets.SERPAPI_API_KEY_4 }}
          
          # Proxies
          WEBSHARE_PROXY_LIST=${{ secrets.WEBSHARE_PROXY_LIST }}
          WEBSHARE_USERNAME_1=${{ secrets.WEBSHARE_USERNAME_1 }}
          WEBSHARE_PASSWORD_1=${{ secrets.WEBSHARE_PASSWORD_1 }}
          WEBSHARE_USERNAME_2=${{ secrets.WEBSHARE_USERNAME_2 }}
          WEBSHARE_PASSWORD_2=${{ secrets.WEBSHARE_PASSWORD_2 }}
          
          # Notion
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_APPLICATIONS_DB_ID=${{ secrets.NOTION_APPLICATIONS_DB_ID }}
          NOTION_JOB_TRACKER_DB_ID=${{ secrets.NOTION_JOB_TRACKER_DB_ID }}
          NOTION_ALERTS_DB_ID=${{ secrets.NOTION_ALERTS_DB_ID }}
          
          # System config
          XAI_COST_CAP_PER_RUN=0.38
          TOTAL_MONTHLY_BUDGET=10.00
          JOBS_PER_RUN_TARGET=150
          JOBS_PER_RUN_MINIMUM=100
          MAX_PLAYWRIGHT_SESSIONS=5
          AUTO_APPLY_ENABLED=true
          DRY_RUN=false
          LOG_LEVEL=INFO
          RESUME_DIR=/app/resumes
          DEFAULT_RESUME=default_resume.pdf
          EOF
          
          # Copy to home directory for local access
          cp java.env ~/java.env

      # ------------------------------------------------------------------
      # Step 5: Start infrastructure services (Postgres, Redis, ChromaDB, RAG)
      # ------------------------------------------------------------------
      - name: Start infrastructure services
        run: |
          docker compose --env-file java.env up -d postgres redis chromadb rag-server api-server
          echo "Waiting 60s for services to initialize..."
          sleep 60

      # ------------------------------------------------------------------
      # Step 6: Health check infrastructure
      # ------------------------------------------------------------------
      - name: Health check services
        run: |
          echo "Checking service health..."
          
          # Postgres TCP check
          for i in {1..5}; do
            if docker compose exec -T postgres pg_isready -U postgres; then
              echo "✅ Postgres is ready"
              break
            fi
            echo "Waiting for Postgres... (attempt $i/5)"
            sleep 10
          done
          
          # Redis check
          docker compose exec -T redis redis-cli ping || echo "❌ Redis not responding"
          
          # ChromaDB HTTP check
          curl -sf http://localhost:8000/api/v1/heartbeat && echo "✅ ChromaDB healthy" || echo "❌ ChromaDB not healthy"
          
          # RAG Server check
          curl -sf http://localhost:8090/health && echo "✅ RAG Server healthy" || echo "⚠️ RAG Server not responding"
          
          # API Server check
          curl -sf http://localhost:8080/health && echo "✅ API Server healthy" || echo "⚠️ API Server not responding"

      # ------------------------------------------------------------------
      # Step 7: Start Playwright services (scraper + apply)
      # ------------------------------------------------------------------
      - name: Start Playwright services
        run: |
          docker compose --env-file java.env up -d playwright-scraper playwright-apply
          echo "Waiting 30s for Playwright containers..."
          sleep 30
          
          # Health check
          curl -sf http://localhost:8001/health && echo "✅ Scraper healthy" || echo "⚠️ Scraper not responding"
          curl -sf http://localhost:8003/health && echo "✅ Apply service healthy" || echo "⚠️ Apply service not responding"

      # ------------------------------------------------------------------
      # Step 8: Run the pipeline
      # ------------------------------------------------------------------
      - name: Run AI Job Agent Pipeline
        id: pipeline
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          
          echo "Running pipeline in mode: $MODE"
          
          # Run the agent runner container
          docker compose --env-file java.env run --rm \
            -e DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}" \
            aiagentrunner python main.py --mode "$MODE" $DRY_RUN_FLAG \
            2>&1 | tee run_output.txt
          
          # Capture exit code
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Extract key metrics from output for summary
          APPLIED=$(grep -oP 'Applied: \K\d+' run_output.txt || echo "0")
          QUEUED=$(grep -oP 'Queued: \K\d+' run_output.txt || echo "0")
          COST=$(grep -oP 'Cost: \$\K[0-9.]+' run_output.txt || echo "0.00")
          
          echo "jobs_applied=$APPLIED" >> $GITHUB_OUTPUT
          echo "jobs_queued=$QUEUED" >> $GITHUB_OUTPUT
          echo "cost_usd=$COST" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Step 9: Collect logs
      # ------------------------------------------------------------------
      - name: Collect container logs
        if: always()
        run: |
          mkdir -p logs
          docker compose --env-file java.env logs --no-color > logs/all_services.log 2>&1 || true
          docker compose --env-file java.env logs aiagentrunner --no-color > logs/aiagentrunner.log 2>&1 || true
          cp run_output.txt logs/ || true

      # ------------------------------------------------------------------
      # Step 10: Upload run artifacts
      # ------------------------------------------------------------------
      - name: Upload run logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # ------------------------------------------------------------------
      # Step 11: Cleanup - stop all services
      # ------------------------------------------------------------------
      - name: Stop all services
        if: always()
        run: |
          docker compose --env-file java.env down --volumes --remove-orphans

      # ------------------------------------------------------------------
      # Step 12: Job summary
      # ------------------------------------------------------------------
      - name: Generate job summary
        if: always()
        run: |
          EXIT_CODE="${{ steps.pipeline.outputs.exit_code || '1' }}"
          APPLIED="${{ steps.pipeline.outputs.jobs_applied || '0' }}"
          QUEUED="${{ steps.pipeline.outputs.jobs_queued || '0' }}"
          COST="${{ steps.pipeline.outputs.cost_usd || '0.00' }}"
          
          if [ "$EXIT_CODE" -eq 0 ]; then
            STATUS="✅ SUCCESS"
          else
            STATUS="❌ FAILED (exit code: $EXIT_CODE)"
          fi
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## AI Job Application Agent - Pipeline Run
          
          **Status**: $STATUS
          
          | Metric | Value |
          |--------|-------|
          | Jobs Applied | $APPLIED |
          | Jobs Queued | $QUEUED |
          | Cost (USD) | \$$COST |
          | Run Number | ${{ github.run_number }} |
          | Triggered By | ${{ github.event_name }} |
          | Mode | ${{ github.event.inputs.mode || 'full' }} |
          | Dry Run | ${{ github.event.inputs.dry_run || 'false' }} |
          
          [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

  # ------------------------------------------------------------------
  # Failure notification job
  # ------------------------------------------------------------------
  notify_failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: run_pipeline
    if: failure()
    
    steps:
      - name: Send Notion failure alert
        run: |
          # Send alert to Notion via curl
          if [ -n "${{ secrets.NOTION_API_KEY }}" ] && [ -n "${{ secrets.NOTION_ALERTS_DB_ID }}" ]; then
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            
            curl -s -X POST "https://api.notion.com/v1/pages" \
              -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d '{
                "parent": { "database_id": "${{ secrets.NOTION_ALERTS_DB_ID }}" },
                "properties": {
                  "Title": {
                    "title": [{ "text": { "content": "🚨 Pipeline Failed - Run #${{ github.run_number }}" } }]
                  },
                  "Level": {
                    "select": { "name": "CRITICAL" }
                  },
                  "Timestamp": {
                    "date": { "start": "'"$TIMESTAMP"'" }
                  },
                  "Message": {
                    "rich_text": [{ "text": { "content": "GitHub Actions pipeline failed. Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" } }]
                  }
                }
              }' || echo "Failed to send Notion alert"
            
            echo "Notion alert sent"
          else
            echo "Notion credentials not configured - skipping alert"
          fi

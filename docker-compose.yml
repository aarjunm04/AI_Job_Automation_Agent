networks:
  ai_job_network:
    driver: bridge
    name: ai_job_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chromadb_data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # TIER 0 — Infrastructure
  # ---------------------------------------------------------------------------
  ai_postgres:
    image: pgvector/pgvector:pg15
    container_name: ai_postgres
    restart: unless-stopped
    env_file:
      - ~/java.env
    environment:
      POSTGRES_USER: ${LOCAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-ai_job_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai_job_network

  ai_redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --dir /data
    env_file:
      - ~/java.env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai_job_network

  ai_chromadb:
    image: chromadb/chroma:0.6.3
    container_name: ai_chromadb
    env_file:
      - ~/java.env
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - ai_job_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/api/v2/heartbeat" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
    - "8010:8000"

  # ---------------------------------------------------------------------------
  # TIER 1 — Playwright Base
  # ---------------------------------------------------------------------------
  ai_playwright_base:
    build:
      context: .
      dockerfile: Dockerfile.playwright_base
    image: ai_playwright_base:latest
    container_name: ai_playwright_base
    restart: "no"
    env_file:
      - ~/java.env
    networks:
      - ai_job_network

  # ---------------------------------------------------------------------------
  # TIER 2 — Playwright Services
  # ---------------------------------------------------------------------------
  ai_playwright_scraper:
    build:
      context: .
      dockerfile: scrapers/Dockerfile
    image: ai_playwright_scraper:latest
    container_name: ai_playwright_scraper
    restart: unless-stopped
    env_file:
      - ~/java.env
    environment:
      SCRAPER_SERVICE_API_KEY: ${SCRAPER_SERVICE_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONPATH: /app
      LOCAL_POSTGRES_URL: postgresql://${LOCAL_POSTGRES_USER}:${LOCAL_POSTGRES_PASSWORD}@ai_postgres:5432/${LOCAL_POSTGRES_DB:-ai_job_db}
      REDIS_URL: redis://ai_redis:6379/0
      SCRAPER_SERVICE_URL: http://ai_playwright_scraper:8001
    ports:
      - "8001:8001"
    depends_on:
      ai_postgres:
        condition: service_healthy
      ai_redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    volumes:
      - ./app/resumes:/app/resumes:ro
      - ./config:/app/config:ro
    networks:
      - ai_job_network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  ai_playwright_apply:
    build:
      context: .
      dockerfile: auto_apply/Dockerfile
    image: ai_playwright_apply:latest
    container_name: ai_playwright_apply
    restart: unless-stopped
    env_file:
      - ~/java.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONPATH: /app
      LOCAL_POSTGRES_URL: postgresql://${LOCAL_POSTGRES_USER}:${LOCAL_POSTGRES_PASSWORD}@ai_postgres:5432/${LOCAL_POSTGRES_DB:-ai_job_db}
      REDIS_URL: redis://ai_redis:6379/0
      APPLY_SERVICE_URL: http://ai_playwright_apply:8003
    ports:
      - "8003:8003"
    depends_on:
      ai_postgres:
        condition: service_healthy
      ai_redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8003/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    volumes:
      - ./app/resumes:/app/resumes:ro
      - ./config:/app/config:ro


    networks:
      - ai_job_network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ---------------------------------------------------------------------------
  # TIER 3 — Lean Python Services
  # ---------------------------------------------------------------------------
  ai_rag_server:
    build:
      context: .
      dockerfile: rag_systems/Dockerfile
    image: ai_rag_server:latest
    container_name: ai_rag_server
    restart: unless-stopped
    env_file:
      - ~/java.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONPATH: /app
      CHROMADB_HOST: ai_chromadb
      CHROMADB_PORT: 8000
      REDIS_URL: redis://ai_redis:6379/0
      RAG_SERVER_URL: http://ai_rag_server:8090
      RESUME_DIR: /app/resumes
    ports:
      - "8090:8090"
    depends_on:
      ai_postgres:
        condition: service_healthy
      ai_chromadb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8090/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./app/resumes:/app/resumes:ro
      - ./logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - ai_job_network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  ai_api_server:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: ai_api_server:latest
    container_name: ai_api_server
    restart: unless-stopped
    env_file:
      - ~/java.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONPATH: /app
      LOCAL_POSTGRES_URL: postgresql://${LOCAL_POSTGRES_USER}:${LOCAL_POSTGRES_PASSWORD}@ai_postgres:5432/${LOCAL_POSTGRES_DB:-ai_job_db}
      REDIS_URL: redis://ai_redis:6379/0
      RAG_SERVER_URL: http://ai_rag_server:8090
      SCRAPER_SERVICE_URL: http://ai_playwright_scraper:8001
      APPLY_SERVICE_URL: http://ai_playwright_apply:8003
      CHROMADB_HOST: ai_chromadb
      CHROMADB_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      ai_postgres:
        condition: service_healthy
      ai_redis:
        condition: service_healthy
      ai_rag_server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./config:/app/config:ro
    networks:
      - ai_job_network

  # ---------------------------------------------------------------------------
  # TIER 4 — Runner
  # ---------------------------------------------------------------------------
  ai_agent_runner:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai_agent_runner:latest
    container_name: ai_agent_runner
    restart: "no"
    env_file:
      - ~/java.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONPATH: /app
      CHROMADB_HOST: ai_chromadb
      CHROMADB_PORT: "8000"
      REDIS_URL: redis://ai_redis:6379/0
      RESUME_DIR: /app/resumes
      DRY_RUN: ${DRY_RUN:-false}
      ACTIVE_DB: ${ACTIVE_DB:-local}
      LOCAL_POSTGRES_URL: postgresql://${LOCAL_POSTGRES_USER}:${LOCAL_POSTGRES_PASSWORD}@ai_postgres:5432/${LOCAL_POSTGRES_DB:-ai_job_db}
      RAG_SERVER_URL: http://ai_rag_server:8090
      SCRAPER_SERVICE_URL: http://ai_playwright_scraper:8001
      APPLY_SERVICE_URL: http://ai_playwright_apply:8003
    depends_on:
      ai_postgres:
        condition: service_healthy
      ai_redis:
        condition: service_healthy
      ai_chromadb:
        condition: service_healthy
      ai_rag_server:
        condition: service_healthy
      ai_api_server:
        condition: service_healthy
      ai_playwright_scraper:
        condition: service_healthy
      ai_playwright_apply:
        condition: service_healthy
    volumes:
      - ./app/resumes:/app/resumes:ro
      - ./logs:/app/logs
      - ./config:/app/config:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - ai_job_network 
    profiles: [ "batch" ]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G


# =============================================================================
# AI Job Automation Agent — Production Docker Compose
# =============================================================================
# Services : postgres | redis | chromadb | rag-server | agentrunner
# Network  : ai_job_network (bridge, single)
# Secrets  : ~/java.env loaded as env_file at runtime — NEVER baked into image
# Volumes  : named volumes for postgres / redis / chromadb (no bind-mount data dirs)
# =============================================================================

version: "3.8"

networks:
  ai_job_network:
    driver: bridge
    name: ai_job_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chromadb_data:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — primary relational store for jobs, applications, state
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ai_postgres
    restart: unless-stopped
    env_file:
      - ~/java.env
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - ai_job_network

  # ---------------------------------------------------------------------------
  # Redis 7 — in-memory cache and session store (AOF persistence)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --dir /data
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - ai_job_network

  # ---------------------------------------------------------------------------
  # ChromaDB — vector database for resume embeddings
  # Exposed on host at :8001 so devs can inspect via HTTP
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    networks:
      - ai_job_network

  # ---------------------------------------------------------------------------
  # RAG Server — FastAPI endpoint consumed by the Chrome extension
  # Source   : rag_systems/production_server.py  (app object confirmed)
  # Port     : 8090 (host) → 8090 (container)
  # ---------------------------------------------------------------------------
  rag-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_rag_server
    restart: unless-stopped
    env_file:
      - ~/java.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      REDIS_URL: redis://redis:6379/0
      RESUME_DIR: /app/resumes
    command:
      - uvicorn
      - rag_systems.production_server:app
      - --host
      - "0.0.0.0"
      - --port
      - "8090"
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./app/resumes:/app/resumes:ro
      - ./logs:/app/logs
    networks:
      - ai_job_network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ---------------------------------------------------------------------------
  # Agent Runner — autonomous pipeline (batch job; exits when done)
  # restart: "no" — this is NOT a daemon; it runs once per scheduling trigger
  # ---------------------------------------------------------------------------
  agentrunner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_agentrunner
    restart: "no"
    env_file:
      - ~/java.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      REDIS_URL: redis://redis:6379/0
      RESUME_DIR: /app/resumes
      DRY_RUN: ${DRY_RUN:-false}
      ACTIVE_DB: ${ACTIVE_DB:-local}
      LOCAL_POSTGRES_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_job_db}
    command: ["python", "main.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      rag-server:
        condition: service_healthy
    volumes:
      - ./app/resumes:/app/resumes:ro
      - ./logs:/app/logs
    networks:
      - ai_job_network

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Agent</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- ── HEADER ───────────────────────────────────────────────── -->
  <header class="popup-header">
    <span class="header-title">🤖 AI Job Agent</span>
    <span class="queue-badge">Queue: <span id="queue-count">—</span></span>
  </header>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!-- STATE 1: IDLE                                               -->
  <!-- ──────────────────────────────────────────────────────────── -->
  <div id="idle-view" class="state-view" hidden>
    <div class="state-message">
      <span class="state-icon">🔍</span>
      <p>Open a job listing to get started</p>
    </div>
  </div>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!-- STATE 2: SCANNING                                           -->
  <!-- ──────────────────────────────────────────────────────────── -->
  <div id="scanning-view" class="state-view" hidden>
    <div class="state-message">
      <span class="spinner" aria-label="Scanning"></span>
      <p>Scanning page…</p>
    </div>
  </div>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!-- STATE 3: SCORED                                             -->
  <!-- ──────────────────────────────────────────────────────────── -->
  <div id="scored-view" class="state-view" hidden>

    <!-- Score card -->
    <section class="score-card">
      <div class="score-header">
        <div class="score-display">
          <span id="score-value" class="score-value">—</span>
          <span class="score-label">Fit Score</span>
        </div>
        <div class="job-meta">
          <div id="job-title" class="job-title"></div>
          <div id="job-company" class="job-company"></div>
        </div>
      </div>
      <div class="score-bar-track">
        <div id="score-bar" class="bar"></div>
      </div>
    </section>

    <!-- Resume used -->
    <section class="resume-section">
      <div class="section-label">📄 Resume Used</div>
      <div id="resume-used" class="resume-name">—</div>
    </section>

    <!-- Talking points -->
    <section class="tp-section">
      <div class="section-label">💡 Talking Points</div>
      <ul id="talking-points" class="tp-list"></ul>
    </section>

    <!-- Action buttons -->
    <section class="actions-row">
      <button id="btn-autofill" class="btn btn-primary">⚡ Autofill Form</button>
      <button id="btn-auto-apply" class="btn btn-success" hidden>🚀 Auto Apply</button>
      <button id="btn-track-job" class="btn btn-secondary">📋 Track Job</button>
    </section>

    <!-- Track confirmation flash -->
    <div id="track-confirm" class="track-confirm" hidden>✓ Logged to tracker</div>

  </div>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!-- STATE 4: AUTOFILLING                                        -->
  <!-- ──────────────────────────────────────────────────────────── -->
  <div id="autofilling-view" class="state-view" hidden>
    <div class="state-message">
      <span class="spinner" aria-label="Autofilling"></span>
      <p>Autofilling form…</p>
    </div>
  </div>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!-- STATE 5: APPLYING                                           -->
  <!-- ──────────────────────────────────────────────────────────── -->
  <div id="applying-view" class="state-view" hidden>
    <div class="state-message">
      <span class="spinner" aria-label="Applying"></span>
      <p>Submitting application…</p>
    </div>
  </div>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!-- STATE 6: ERROR                                              -->
  <!-- ──────────────────────────────────────────────────────────── -->
  <div id="error-view" class="state-view" hidden>
    <div class="state-message error-state">
      <span class="state-icon">⚠️</span>
      <p id="error-message">An error occurred.</p>
      <button id="btn-retry" class="btn btn-secondary">↩ Retry</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Agent</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- 1. HEADER BAR -->
  <header class="sidebar-header">
    <span class="header-title">🤖 AI Job Agent</span>
    <span class="conn-dot" id="conn-dot" title="Checking connection…"></span>
  </header>

  <!-- 2. JOB SCORE CARD -->
  <section class="score-card" id="score-card">
    <div class="score-badge-wrap">
      <span class="score-badge" id="score-badge">—</span>
      <span class="score-badge-label">Fit Score</span>
    </div>
    <div class="score-meta">
      <div class="score-title" id="score-title">Loading match data…</div>
      <div class="score-company" id="score-company"></div>
      <div class="score-reasoning" id="score-reasoning"></div>
    </div>
  </section>

  <!-- 3. RESUME SUGGESTION -->
  <section class="resume-section">
    <div class="resume-label">📄 Suggested Resume</div>
    <div class="resume-row">
      <span class="resume-name" id="resume-name">—</span>
      <span class="similarity-badge" id="similarity-badge"></span>
    </div>
  </section>

  <!-- 4. TALKING POINTS -->
  <section class="tp-section">
    <div class="tp-header">💡 Talking Points</div>
    <ul class="tp-list" id="tp-list">
      <li class="tp-item tp-placeholder">Match a job to see talking points.</li>
    </ul>
  </section>

  <!-- 5. ACTION BUTTONS ROW -->
  <section class="actions-row">
    <button class="btn btn-autofill" id="btn-autofill">⚡ Autofill Form</button>
    <button class="btn btn-queue" id="btn-queue">📋 Queue to Notion</button>
    <button class="btn btn-applied" id="btn-applied">✓ Mark Applied</button>
  </section>

  <!-- 6. STATUS LOG -->
  <section class="status-log-section">
    <div class="status-log-label">Event Log</div>
    <div class="status-log" id="status-log">
      <div class="log-entry">Extension ready.</div>
    </div>
  </section>

  <script src="popup.js"></script>
</body>

</html>
